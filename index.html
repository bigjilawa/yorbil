function generateStatement() {
  // Date range picker modal
  const inc = S.settings.incomes;
  const defaultStart = inc.length ? inc[inc.length-1].cycleStart : addDays(today(),-13);
  const defaultEnd = today();
  modal('Generate Statement', `
    <div style="font-size:12px;color:var(--text2);margin-bottom:12px">Choose the date range for your statement.</div>
    <div class="f2">
      <div class="ff"><label>From</label><input id="st-s" type="date" value="${defaultStart}"></div>
      <div class="ff"><label>To</label><input id="st-e" type="date" value="${defaultEnd}"></div>
    </div>
    <div style="font-size:11px;color:var(--text3);margin-top:4px">Includes all bills paid, one-offs, variables logged, and leaks in this range.</div>`,
  () => {
    const rangeStart = $('st-s').value;
    const rangeEnd   = $('st-e').value;
    if(!rangeStart||!rangeEnd||rangeStart>rangeEnd){alert('Please select a valid date range.');return;}
    buildAndPrintStatement(rangeStart, rangeEnd);
  });
}

function buildAndPrintStatement(ws, we) {
  const hn = S.settings.householdName || 'Household';

  // Collect bills paid in range
  const paidBills = [];
  S.bills.forEach(b => {
    (b.paidHistory||[]).forEach(h => {
      if(h.actual >= ws && h.actual <= we) {
        paidBills.push({name:b.name, due:h.due, paid:h.actual,
          budgeted:h.budgeted||b.amount, actual:h.actualAmt||h.budgeted||b.amount,
          diff:(h.actualAmt||h.budgeted||b.amount)-(h.budgeted||b.amount),
          retry:h.retry||false, linkedLoan:b.linkedLoanId?S.loans.find(l=>l.id===b.linkedLoanId)?.name:null});
      }
    });
  });
  paidBills.sort((a,b)=>a.paid.localeCompare(b.paid));

  // Collect one-offs paid in range
  const paidOneoffs = S.oneoffs.filter(o=>o.paid&&o.paidDate>=ws&&o.paidDate<=we)
    .sort((a,b)=>a.paidDate.localeCompare(b.paidDate));

  // Collect variables logged in range
  const loggedVars = [];
  S.variables.forEach(v=>{
    (v.history||[]).forEach(h=>{
      if(h.date>=ws&&h.date<=we) loggedVars.push({name:v.name,date:h.date,budgeted:h.budgeted,actual:h.actual,diff:h.diff});
    });
  });
  loggedVars.sort((a,b)=>a.date.localeCompare(b.date));

  // Collect leaks in range
  const leaksInRange = S.leaks.filter(l=>l.date>=ws&&l.date<=we)
    .sort((a,b)=>a.date.localeCompare(b.date));

  // Income for each person covering this range
  const incomeRows = S.settings.incomes.filter(p=>{
    return p.cycleStart<=we && p.cycleEnd>=ws;
  });

  // Totals
  const totalBills   = paidBills.reduce((s,b)=>s+b.actual,0);
  const totalOneoffs = paidOneoffs.reduce((s,o)=>s+(o.actualAmount||o.amount),0);
  const totalVars    = loggedVars.reduce((s,v)=>s+v.actual,0);
  const totalLeaks   = leaksInRange.reduce((s,l)=>s+l.amount,0);
  const totalOut     = totalBills+totalOneoffs+totalVars+totalLeaks;
  const totalIncome  = incomeRows.reduce((s,p)=>s+p.amount,0);

  const fd = d => new Date(d+'T00:00:00').toLocaleDateString('en-AU',{day:'numeric',month:'short',year:'numeric'});
  const fm = n => '$'+(+n||0).toLocaleString('en-AU',{minimumFractionDigits:2,maximumFractionDigits:2});

  function section(title, rows, cols, emptyMsg) {
    if(!rows.length) return `<div class="st-section"><div class="st-section-title">${title}</div><div class="st-empty">${emptyMsg}</div></div>`;
    return `<div class="st-section">
      <div class="st-section-title">${title}</div>
      <table class="st-table">
        <thead><tr>${cols.map(c=>`<th style="text-align:${c.right?'right':'left'}">${c.label}</th>`).join('')}</tr></thead>
        <tbody>${rows.map(r=>`<tr>${r.map((cell,i)=>`<td style="text-align:${cols[i]?.right?'right':'left'};${cols[i]?.muted?'color:#64748b':''}">${cell}</td>`).join('')}</tr>`).join('')}</tbody>
      </table>
    </div>`;
  }

  const win = window.open('','_blank');
  win.document.write(`<!DOCTYPE html><html><head><meta charset="utf-8">
  <title>${hn} Statement — ${fd(ws)} to ${fd(we)}</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:Arial,sans-serif;font-size:13px;color:#1e293b;padding:32px;max-width:900px;margin:0 auto}
    .st-header{border-bottom:3px solid #2E4A8B;padding-bottom:16px;margin-bottom:24px}
    .st-title{font-size:28px;font-weight:700;color:#2E4A8B;letter-spacing:2px}
    .st-sub{font-size:13px;color:#64748b;margin-top:4px}
    .st-range{font-size:13px;font-weight:600;color:#1e293b;margin-top:8px}
    .st-section{margin-bottom:24px}
    .st-section-title{font-size:11px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:#2E4A8B;border-bottom:1.5px solid #2E4A8B40;padding-bottom:6px;margin-bottom:10px}
    .st-empty{font-size:12px;color:#94a3b8;padding:8px 0}
    .st-table{width:100%;border-collapse:collapse;font-size:12px}
    .st-table th{font-size:10px;font-weight:700;color:#64748b;padding:6px 8px;border-bottom:1px solid #e2e8f0;text-transform:uppercase;letter-spacing:.04em}
    .st-table td{padding:7px 8px;border-bottom:0.5px solid #f1f5f9}
    .st-table tr:last-child td{border-bottom:none}
    .st-table tr:nth-child(even) td{background:#f8fafc}
    .st-totals{background:#f1f5f9;border-radius:10px;padding:16px;margin-bottom:24px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
    .st-total-item .lbl{font-size:10px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.05em}
    .st-total-item .val{font-size:18px;font-weight:700;color:#1e293b;margin-top:3px}
    .st-total-item .val.red{color:#dc2626}.st-total-item .val.green{color:#16a34a}.st-total-item .val.blue{color:#2E4A8B}
    .pill{display:inline-block;font-size:9px;font-weight:700;padding:1px 6px;border-radius:99px;margin-left:4px}
    .pill-r{background:#fee2e2;color:#dc2626}.pill-b{background:#dbeafe;color:#1d4ed8}.pill-g{background:#dcfce7;color:#16a34a}
    .st-footer{border-top:1px solid #e2e8f0;padding-top:12px;font-size:11px;color:#94a3b8;text-align:center;margin-top:32px}
    @media print{body{padding:16px}button{display:none!important}}

  if(!count) return;
  modal('Clear all leaks',`
    <div style="text-align:center;padding:8px 0">
      <div style="font-size:32px;margin-bottom:8px">⚠</div>
      <div style="font-size:14px;font-weight:600;color:var(--text);margin-bottom:6px">Delete all ${count} leak${count!==1?'s':''}?</div>
      <div style="font-size:12px;color:var(--text2)">This cannot be undone. All logged leaks will be permanently removed.</div>
    </div>`,
  ()=>{
    saveAction(`All leaks cleared (${count} entries)`, { leaks: JSON.parse(JSON.stringify(S.leaks)) });

    autoSave();renderKeepScroll();

  if(!cat||!amt){alert('Please enter a category and amount.');return;}

function setIncomeCount(n){
  const inc=S.settings.incomes;
  const cols=['#4a9fff','#8b5cf6','#0fb8a0','#e09a1a'];
  while(inc.length<n){
    const startDate=inc.length>0?addDays(inc[inc.length-1].cycleEnd||today(),1):today();
    inc.push({id:nid(),name:'',cycleStart:startDate,cycleEnd:addDays(startDate,6),cycleType:'FORTNIGHTLY',amount:0,bank:0,alloc:0,color:cols[inc.length]||'#4a9fff'});
  }
  while(inc.length>n)inc.pop();
  autoSave();renderKeepScroll();
}

    </div>
    <div class="f2">
      <div class="ff"><label>Bank balance ($)</label><input id="ob-pb" type="number" value="${p.bank||''}" placeholder="0.00"></div>
      <div class="ff"><label>Personal alloc ($)</label><input id="ob-pa" type="number" value="${p.alloc||''}" placeholder="0"></div>
    </div>
    <div class="ob-nav"><button class="btn sm" onclick="obPrev()">← Back</button><button class="btn primary" onclick="obSavePerson(${i})">Continue →</button></div>`;}

  else if(step==='done'){html=`<div class="ob-progress">${prog}</div>
    <div class="ob-title">You're all set!</div>
    <div class="ob-sub">Add your bills, loans, and savings goals to get the full picture.</div>
    <div class="card card-p" style="margin:0 0 20px">
      <div style="font-size:13px;font-weight:600;color:var(--text);margin-bottom:8px">Each pay day</div>
      <div style="font-size:13px;color:var(--text2);line-height:1.9">
        1. Go to <strong style="color:var(--text)">Setup</strong> → update coverage dates, income & bank balance<br>
        2. Check <strong style="color:var(--text)">Home</strong> for shortfall warnings and rollovers<br>
        3. Log unplanned spending in <strong style="color:var(--text)">Leaks</strong>
      </div>
    </div>
    <div class="ob-nav"><button class="btn sm" onclick="obPrev()">← Back</button><button class="btn primary" onclick="obFinish()">Start using Yorbil →</button></div>`;}

  $('ob').innerHTML=`<div class="ob-inner">${html}</div>`;
}

function obNext(){obStep++;renderOB();}
function obPrev(){if(obStep>0){obStep--;renderOB();}}
function obSetCount(n){
  obData.incomeCount=n;
  const cols=['#4a9fff','#8b5cf6','#0fb8a0','#e09a1a'];
  while(obData.incomes.length<n){
    const prev=obData.incomes[obData.incomes.length-1];
    const startDate=prev?addDays(prev.cycleEnd||today(),1):today();
    obData.incomes.push({id:nid(),name:'',cycleStart:startDate,cycleEnd:addDays(startDate,6),cycleType:'FORTNIGHTLY',amount:0,bank:0,alloc:0,color:cols[obData.incomes.length]||'#4a9fff'});
  }
  while(obData.incomes.length>n)obData.incomes.pop();
}
function obSaveHousehold(){obData.householdName=($('ob-hn')||{}).value||'';const nc=$('ob-nc');if(nc)obSetCount(+nc.value);obNext();}
function obSavePerson(i){
  const name=($('ob-pn')||{}).value||'';
  if(!name.trim()){alert('Please enter a name.');return;}
  obData.incomes[i].name=name.trim();
  obData.incomes[i].cycleStart=($('ob-cs')||{}).value||today();
  obData.incomes[i].cycleEnd=($('ob-ce')||{}).value||addDays(today(),6);
  obData.incomes[i].cycleType=($('ob-ct')||{}).value||'FORTNIGHTLY';
  obData.incomes[i].amount=+($('ob-pi')||{}).value||0;
  obData.incomes[i].bank=+($('ob-pb')||{}).value||0;
  obData.incomes[i].alloc=+($('ob-pa')||{}).value||0;
  obNext();
}
function obFinish(){
  S.onboarded=true;S.settings.householdName=obData.householdName||'Our Household';
  S.settings.incomes=obData.incomes;S.settings.sharedAllocs=obData.sharedAllocs;
  autoSave();$('ob').style.display='none';document.body.className=S.theme==='light'?'light':'';
  renderNav();PAGE='dashboard';render();
}

// ══════════════════════════════════════════════════════════════════════════════
// INIT — migrate old anchorDate model to new cycleStart/cycleEnd model
// ══════════════════════════════════════════════════════════════════════════════
function init(){
  const saved=STORAGE.load();S=saved||blankState();NID=S.nid||100;

  // Migration: old model used anchorDate+cycleType, new model uses cycleStart+cycleEnd
  if(Array.isArray(S.settings.incomes)){
    S.settings.incomes.forEach(inc=>{
      if(inc.anchorDate && !inc.cycleStart){
        inc.cycleStart = inc.anchorDate;
        inc.cycleEnd   = addDays(inc.anchorDate, 6);
        delete inc.anchorDate;
        delete inc.payDay;
        console.log('[Yorbil] Migrated anchorDate → cycleStart/cycleEnd for', inc.name);
      }
    });
    // Migrate bill.missed and bill.pinned defaults
    S.bills.forEach(b=>{
      if(b.missed===undefined) b.missed=false;
      if(b.pinned===undefined) b.pinned=false;
    });
  }

  document.body.className=S.theme==='light'?'light':'';
  if(!S.onboarded){showOnboarding();}else{renderNav();render();}
  if('serviceWorker' in navigator){navigator.serviceWorker.register('./sw.js').catch(()=>{});}
  // Re-render nav on resize (desktop ↔ mobile switch)
  window.addEventListener('resize', () => { renderNav(); });
}
init();
</script>

<div id="install-banner" style="display:none;position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#1e2840;border:0.5px solid #4a9fff;border-radius:12px;padding:12px 16px;font-size:13px;color:#e8eef8;z-index:500;box-shadow:0 4px 24px rgba(0,0,0,.4);display:none;align-items:center;gap:10px;max-width:340px;width:calc(100% - 28px)">
  <div style="flex:1"><strong>Install Yorbil</strong><br><span style="font-size:11px;color:#8ac4ff">Add to home screen for offline access</span></div>
  <button onclick="doInstall()" style="background:#4a9fff;color:#fff;border:none;border-radius:8px;padding:6px 12px;font-size:12px;font-weight:600;cursor:pointer">Install</button>
  <button onclick="document.getElementById('install-banner').style.display='none'" style="background:transparent;color:#8a9bc0;border:none;font-size:16px;cursor:pointer;padding:0 4px">✕</button>
</div>
<script>
let deferredPrompt = null;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  const banner = document.getElementById('install-banner');
  if (banner) { banner.style.display = 'flex'; }
});
window.addEventListener('appinstalled', () => {
  const banner = document.getElementById('install-banner');
  if (banner) banner.style.display = 'none';
  deferredPrompt = null;
});
function doInstall() {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  deferredPrompt.userChoice.then(() => { deferredPrompt = null; });
  document.getElementById('install-banner').style.display = 'none';
}
</script>
</div><!-- /shell -->
