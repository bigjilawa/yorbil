<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">

<title>Yorbil</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&family=DM+Mono:wght@400;500&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--ff:'DM Sans',system-ui,sans-serif;--fm:'DM Mono',monospace;}
body{
  --bg:#0a0e1a;--bg2:#111624;--bg3:#181f33;--bg4:#1e2840;
  --border:#232f4a;--border2:#2e3f64;
  --text:#eef2ff;--text2:#a0aec8;--text3:#5a6a90;
  --blue:#4a9fff;--blue-d:#07142a;--blue-t:#8ac4ff;
  --green:#2ec87a;--green-d:#061a10;--green-t:#5ddea4;
  --red:#e05555;--red-d:#200a0a;--red-t:#f08888;
  --amber:#e09a1a;--amber-d:#1f1200;--amber-t:#f0c040;
  --purple:#8b5cf6;--purple-d:#130828;--purple-t:#b794ff;
  --teal:#0fb8a0;--teal-d:#041614;--teal-t:#4dd4c0;
  background:var(--bg);color:var(--text);font-family:var(--ff);font-size:14px;
}
.row{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;border-bottom:0.5px solid var(--border);gap:8px}
.row:last-child{border-bottom:none}
.row-l{flex:1;min-width:0}
.row-lbl{font-size:13px;font-weight:500;color:var(--text)}
.row-sub{font-size:11px;color:var(--text2);margin-top:2px}
.row-r{text-align:right;flex-shrink:0;display:flex;flex-direction:column;align-items:flex-end;gap:3px}
.row-amt{font-size:14px;font-weight:600;font-family:var(--fm);color:var(--text)}
.pill{display:inline-flex;align-items:center;padding:2px 7px;border-radius:99px;font-size:10px;font-weight:700}
.p-g{background:var(--green-d);color:var(--green-t)}.p-r{background:var(--red-d);color:var(--red-t)}
.p-a{background:var(--amber-d);color:var(--amber-t)}.p-b{background:var(--blue-d);color:var(--blue-t)}
.p-gray{background:var(--bg4);color:var(--text2)}.p-p{background:var(--purple-d);color:var(--purple-t)}
.p-t{background:var(--teal-d);color:var(--teal-t)}
.btn{padding:8px 16px;font-size:13px;font-weight:500;border:0.5px solid var(--border2);border-radius:9px;background:transparent;color:var(--text);cursor:pointer;font-family:var(--ff);transition:all .15s;white-space:nowrap}
.btn:active{transform:scale(.97)}
.btn.primary{background:var(--blue);color:#fff;border-color:var(--blue)}
.btn.danger{color:var(--red-t);border-color:var(--red-d)}
.btn.sm{padding:4px 10px;font-size:11px;font-weight:600}
.btn-icon{width:30px;height:30px;display:inline-flex;align-items:center;justify-content:center;border:0.5px solid var(--border);border-radius:8px;background:transparent;color:var(--text2);cursor:pointer;font-size:14px;flex-shrink:0;font-family:var(--ff)}
.btn-icon:active{background:var(--bg3)}
.bill-row{border-bottom:0.5px solid var(--border);padding:10px 14px}
.bill-row:last-child{border-bottom:none}
.bill-row-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:8px}
.bill-row-amt{text-align:right;flex-shrink:0}
.bill-row-actions{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.bill-btn{display:inline-flex;align-items:center;justify-content:center;padding:5px 10px;font-size:12px;font-weight:600;border:0.5px solid var(--border);border-radius:8px;background:transparent;color:var(--text2);cursor:pointer;font-family:var(--ff);white-space:nowrap;min-height:32px;gap:3px}
.bill-btn:active{transform:scale(.97)}
.bill-btn.green{color:var(--green-t);border-color:var(--green-d)}
.bill-btn.teal{color:var(--teal-t);border-color:var(--teal-d)}
.bill-btn.amber{color:var(--amber-t);border-color:var(--amber-d)}
.bill-btn.red{color:var(--red-t);border-color:var(--red-d)}
.tog{width:40px;height:24px;border-radius:99px;background:var(--bg4);border:0.5px solid var(--border2);cursor:pointer;position:relative;display:inline-block;flex-shrink:0;transition:background .2s}
.tog.on{background:var(--green);border-color:var(--green)}
.tog-dot{position:absolute;top:3px;left:3px;width:16px;height:16px;border-radius:50%;background:#fff;transition:left .2s;box-shadow:0 1px 3px rgba(0,0,0,.3)}
.tog.on .tog-dot{left:19px}
input,select,textarea{background:var(--bg3);border:0.5px solid var(--border2);border-radius:9px;padding:9px 12px;font-size:14px;color:var(--text);font-family:var(--ff);outline:none;width:100%;-webkit-appearance:none;transition:border-color .15s}
input:focus,select:focus{border-color:var(--blue)}
.card{background:var(--bg2);border-radius:14px;border:0.5px solid var(--border);margin:6px 14px;overflow:hidden}
.card.card-p{padding:14px}
.card-hd{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;background:var(--bg3);border-bottom:0.5px solid var(--border)}
.card-hd-t{font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--text2)}
.sec-lbl{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);padding:12px 14px 4px}
.pg-hdr{display:flex;justify-content:space-between;align-items:center;padding:14px 14px 10px;position:sticky;top:0;background:var(--bg);border-bottom:0.5px solid var(--border);z-index:10}
.pg-title{font-size:20px;font-weight:700;color:var(--text)}
.pg-sub{font-size:12px;color:var(--text2);margin-top:2px}
.wb{background:var(--bg2);border-radius:14px;border:0.5px solid var(--border);margin:6px 14px;overflow:hidden}
.wb-hd{display:flex;justify-content:space-between;align-items:flex-start;padding:14px}
.wb-title{font-size:13px;font-weight:700;letter-spacing:.06em;text-transform:uppercase}
.wb-dates{font-size:11px;color:var(--text2);margin-top:2px}
.leftover-row{display:flex;justify-content:space-between;align-items:center;padding:12px 14px;background:var(--bg3)}
.leftover-lbl{font-size:13px;font-weight:600;color:var(--text2)}
.leftover-amt{font-size:24px;font-weight:700;font-family:var(--fm)}
.rollover{background:var(--teal-d);border:0.5px solid var(--teal);border-radius:10px;padding:8px 14px;margin:4px 14px;font-size:12px;color:var(--teal-t);font-weight:600}
.overspend{background:var(--red-d);border-left:4px solid var(--red);padding:8px 14px;font-size:12px;color:var(--red-t);font-weight:600;margin:0}
.lc{background:var(--bg2);border-radius:14px;border:0.5px solid var(--border);margin:6px 14px;padding:14px}
.lc-hd{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.lc-name{font-size:15px;font-weight:700;color:var(--text)}
.lc-sub{font-size:11px;color:var(--text2);margin-top:2px}
.lc-bal{text-align:right}
.lc-cur{font-size:20px;font-weight:700;font-family:var(--fm);color:var(--text)}
.lc-orig{font-size:11px;color:var(--text2)}
.gc{background:var(--bg2);border-radius:14px;border:0.5px solid var(--border);margin:6px 14px;padding:14px}
.pb{height:6px;background:var(--bg4);border-radius:99px;overflow:hidden;margin:4px 0}
.pb-fill{height:100%;background:var(--green);border-radius:99px;transition:width .4s}
.metric{background:var(--bg3);border-radius:10px;padding:10px 12px;border:0.5px solid var(--border)}
.m-lbl{font-size:10px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--text3)}
.m-val{font-size:18px;font-weight:600;font-family:var(--fm);color:var(--text);margin-top:4px}
.m-val.g{color:var(--green-t)}.m-val.a{color:var(--amber-t)}
.sched{width:100%;border-collapse:collapse;font-size:12px;margin-top:8px}
.sched th{text-align:left;font-size:10px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--text3);padding:4px 0;border-bottom:0.5px solid var(--border)}
.sched td{padding:7px 0;border-bottom:0.5px solid var(--border)}
.sched tr:last-child td{border-bottom:none}
.empty{padding:28px 14px;text-align:center;color:var(--text3);font-size:13px}
.alert-info{background:var(--blue-d);color:var(--blue-t);border:0.5px solid var(--blue);padding:10px 14px;border-radius:10px;font-size:13px;margin:0 14px 8px}
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px}
.modal-box{background:var(--bg2);border-radius:18px;padding:20px;width:100%;max-width:480px;max-height:80vh;overflow-y:auto;border:0.5px solid var(--border)}
.modal-title{font-size:16px;font-weight:700;color:var(--text);margin-bottom:14px}
.modal-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:16px}
.ff{margin-bottom:12px}
.ff label{display:block;font-size:11px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--text3);margin-bottom:5px}
.f2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.status-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:0.5px solid var(--border);font-size:12px;color:var(--text2)}
.status-row:last-child{border-bottom:none}
.sdot{width:8px;height:8px;border-radius:50%;background:var(--green);flex-shrink:0}
.ob{position:fixed;inset:0;background:var(--bg);z-index:100;overflow-y:auto}
.ob-inner{max-width:480px;margin:0 auto;padding:40px 20px}
.ob-title{font-size:28px;font-weight:800;color:var(--text);margin-bottom:12px;line-height:1.2}
.ob-sub{font-size:14px;color:var(--text2);margin-bottom:24px;line-height:1.6}
.ob-progress{display:flex;gap:6px;margin-bottom:28px}
.ob-dot{width:8px;height:8px;border-radius:50%;background:var(--bg4)}
.ob-dot.active{background:var(--blue);width:24px;border-radius:99px}
.ob-dot.done{background:var(--green)}
.ob-nav{display:flex;justify-content:space-between;align-items:center;margin-top:24px}

body.light{
  /* Clean white/light grey — maximum contrast */
  --bg:#f2f4f8;--bg2:#ffffff;--bg3:#e8ecf5;--bg4:#d8dff0;
  --border:#b8c4d8;--border2:#8a9ab8;
  --text:#080c18;--text2:#1e2c48;--text3:#485870;
  --blue:#1448c8;--blue-d:#dce8ff;--blue-t:#0c2e8a;
  --green:#0f8c3a;--green-d:#d4f5e2;--green-t:#074a20;
  --red:#c42020;--red-d:#fde0e0;--red-t:#6e0e0e;
  --amber:#b85a00;--amber-d:#fdefd0;--amber-t:#6b3000;
  --purple:#6020c8;--purple-d:#ead8ff;--purple-t:#380a80;
  --teal:#0a7870;--teal-d:#c8f0ec;--teal-t:#044840;
  background:var(--bg);color:var(--text);
}
html,body{height:100%;}
#root{height:100%;display:flex;flex-direction:column;max-width:520px;margin:0 auto;transition:none;padding-bottom:60px}
.nav{display:flex;background:var(--bg2);border-top:0.5px solid var(--border);padding:6px 8px;padding-bottom:max(6px,env(safe-area-inset-bottom));gap:2px;flex-shrink:0;order:2;position:fixed;bottom:0;left:0;right:0;z-index:100}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 2px;border:none;background:none;color:var(--text3);cursor:pointer;border-radius:8px;font-family:var(--ff);transition:all .15s}
.nav-btn .icon{font-size:18px;line-height:1}
.nav-btn .lbl{font-size:9px;font-weight:600;letter-spacing:.04em;text-transform:uppercase}
.nav-btn.active{color:var(--blue);background:var(--blue-d)}
body.light .nav-btn.active{color:#fff;background:var(--blue)}
body.light .btn.primary{background:var(--blue);color:#fff;border-color:var(--blue)}
body.light .btn.sm.primary{background:#1a56d6;color:#fff;border-color:#1a56d6}
body.light .btn{border-color:var(--border2);color:var(--text);background:var(--bg3);font-weight:600}
body.light .btn-icon{border-color:var(--border2);color:var(--text2);background:var(--bg3)}
body.light .nav-btn{color:var(--text3)}
body.light .card{background:var(--bg2);border:0.5px solid var(--border);box-shadow:0 2px 8px rgba(0,0,0,.06)}
body.light .card-hd{background:#f4f6fb;border-bottom:1px solid var(--border)}
body.light .card-hd-t{color:var(--text2);font-weight:700}
body.light .sec-lbl{color:var(--text);font-size:12px;font-weight:800}
body.light .wb{background:var(--bg2);border:1px solid var(--border2);box-shadow:0 4px 16px rgba(0,0,0,.08)}
body.light .wb-hd{background:#f4f6fb;border-bottom:2px solid var(--border2)}
body.light .leftover-row{background:#edf0f8;border-top:2px solid var(--border2)}
body.light .metric{background:#f0f3fa;border:1px solid var(--border)}
body.light .lc{background:var(--bg2);border:1px solid var(--border2);box-shadow:0 2px 8px rgba(0,0,0,.06)}
body.light .gc{background:var(--bg2);border:1px solid var(--border2);box-shadow:0 2px 8px rgba(0,0,0,.06)}
body.light .row{border-bottom-color:var(--border)}
body.light .row:hover{background:#f4f6fb}
body.light .overspend{background:#fee2e2;border-color:var(--red)}
body.light .rollover{background:#e0f5f0;border-color:var(--teal)}
body.light .pg-hdr{background:var(--bg);border-bottom:1.5px solid var(--border2)}
body.light input,body.light select{background:var(--bg3);border-color:var(--border);color:var(--text)}
body.light .tog{background:#c8d4e8;border-color:#8a9ab8}
body.light .tog.on{background:#16a34a;border-color:#16a34a}
body.light .tog-dot{background:#ffffff;box-shadow:0 1px 3px rgba(0,0,0,.25)}
body.light .nav{background:#fff;border-top:2px solid var(--border2)}
body.light .pb{background:#c8d4e8}
body.light .sched th{color:var(--text3)}
body.light .sec-lbl{color:var(--text);font-size:12px;font-weight:800}
body.light .card-hd-t{font-weight:700}
body.light .alert-info{background:#dbeafe;border-color:#1a56d6;color:#1a3fa0}
body.light .bill-btn{background:#fff;border-color:var(--border2);color:var(--text);font-weight:600}
body.light .bill-btn.green{background:#dcfce7;border-color:#16a34a;color:#14532d}
body.light .bill-btn.amber{background:#fef3c7;border-color:#d97706;color:#78350f}
body.light .bill-btn.teal{background:#ccfbf1;border-color:#0d9488;color:#134e4a}
body.light .bill-btn.red{background:#fee2e2;border-color:#dc2626;color:#7f1d1d}
body.light .bill-row{border-bottom-color:var(--border)}
body.light #dt-topbar{background:#fff;border-bottom:1.5px solid var(--border2)}
body.light .dt-tab{color:var(--text2)}
body.light .dt-tab:hover{background:#f0f3fa;color:var(--text)}
body.light .dt-tab.active{background:#dbeafe;color:var(--blue)}

<script>
'use strict';

// ── Core date helpers — defined first so STORAGE module can use them ──────────
const today   = () => {
  const d = new Date();
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,'0');
  const day = String(d.getDate()).padStart(2,'0');
  return y+'-'+m+'-'+day;
};
const addDays = (d,n) => {
  const dt = new Date(d+'T00:00:00');
  dt.setDate(dt.getDate()+n);
  const y = dt.getFullYear();
  const m = String(dt.getMonth()+1).padStart(2,'0');
  const day = String(dt.getDate()).padStart(2,'0');
  return y+'-'+m+'-'+day;
};

// ══════════════════════════════════════════════════════════════════════════════
// STORAGE MODULE
// ══════════════════════════════════════════════════════════════════════════════
const STORAGE = (function() {
  const PROD_KEY   = 'yorbil_v1';
  const BACKUP_PFX = 'yorbil_backup_';
  const SCHEMA_VER = 2;

  function applyDefaults(obj, defaults) {
    const result = Object.assign({}, obj);
    Object.keys(defaults).forEach(k => {
      if (result[k] === undefined || result[k] === null) {
        result[k] = typeof defaults[k] === 'object' && !Array.isArray(defaults[k])
          ? Object.assign({}, defaults[k]) : defaults[k];
      }
    });
    return result;
  }

  function backup(data) {
    const key = BACKUP_PFX + Date.now();
    try {
      localStorage.setItem(key, typeof data === 'string' ? data : JSON.stringify(data));
      const all = Object.keys(localStorage).filter(k => k.startsWith(BACKUP_PFX)).sort();
      while (all.length > 5) localStorage.removeItem(all.shift());
      return key;
    } catch(e) { return null; }
  }

  function migrateV1(old) {
    const data = old.data || old;
    return {
      version: 2, onboarded: data.onboarded || false, theme: data.theme || 'dark',
      nid: data.nid || 100, lastSaved: null,
      settings: applyDefaults(data.settings || {}, { householdName:'', incomes:[], sharedAllocs:[] }),
      bills: data.bills || [], variables: data.variables || [],
      oneoffs: data.oneoffs || [], loans: data.loans || [],
      goals: data.goals || [], leaks: data.leaks || [],
    };
  }

  function load() {
    let rawStr;
    try { rawStr = localStorage.getItem(PROD_KEY); } catch(e) { return null; }
    if (!rawStr) return null;
    let parsed;
    try { parsed = JSON.parse(rawStr); } catch(e) { backup(rawStr); return null; }
    if (!parsed.version || parsed.version < SCHEMA_VER) { backup(rawStr); parsed = migrateV1(parsed); }
    parsed = applyDefaults(parsed, {
      version: SCHEMA_VER, onboarded: false, theme: 'dark', nid: 100, lastSaved: null,
      settings: { householdName:'', incomes:[], sharedAllocs:[] },
      bills:[], variables:[], oneoffs:[], loans:[], goals:[], leaks:[]
    });
    if (Array.isArray(parsed.settings.incomes)) {
      parsed.settings.incomes = parsed.settings.incomes.map(inc =>
        applyDefaults(inc, {
          id:0, name:'', cycleStart: today(), cycleEnd: addDays(today(),6),
          cycleType:'FORTNIGHTLY', amount:0, bank:0, alloc:0, color:'#4a9fff'
        })
      );
    }
    if (Array.isArray(parsed.bills)) {
      parsed.bills = parsed.bills.map(b =>
        applyDefaults(b, {
          id:0, name:'', freq:'MONTHLY', amount:0, lastDue:null,
          paidHistory:[], include:true, missed:false, pinned:false
        })
      );
    }
    // Patch oneoff objects for new fields
    if (Array.isArray(parsed.oneoffs)) {
      parsed.oneoffs = parsed.oneoffs.map(o =>
        applyDefaults(o, { id:0, name:'', amount:0, due:null, who:'HOUSEHOLD',
          include:true, paid:false, paidDate:null, actualAmount:null, history:[] })
      );
    }
    // Patch variable objects for new fields
    if (Array.isArray(parsed.variables)) {
      parsed.variables = parsed.variables.map(v =>
        applyDefaults(v, { id:0, name:'', freq:'WEEKLY', amount:0, dayOfWeek:1,
          inDueList:false, paid:false, paidDate:null, actualAmount:null, history:[] })
      );
    }
    // Migrate actionLog
    if (!Array.isArray(parsed.actionLog)) parsed.actionLog = [];
    // Migrate bill paymentPlan field
    if (Array.isArray(parsed.bills)) {
      parsed.bills = parsed.bills.map(b =>
        applyDefaults(b, { id:0, name:'', freq:'MONTHLY', amount:0, lastDue:null,
          paidHistory:[], include:true, missed:false, pinned:false, linkedLoanId:null,
          paymentPlan:null })
      );
    }
    return parsed;
  }

  function save(state) {
    state.version = SCHEMA_VER; state.lastSaved = new Date().toISOString();
    try { localStorage.setItem(PROD_KEY, JSON.stringify(state)); return true; } catch(e) { return false; }
  }

  function exportJSON(state) {
    const blob = new Blob([JSON.stringify(state, null, 2)], {type:'application/json'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'yorbil-backup-' + today() + '.json'; a.click();
  }

  function importJSON(onSuccess, onError) {
    const inp = document.createElement('input'); inp.type='file'; inp.accept='.json';
    inp.onchange = e => {
      const file = e.target.files[0]; if(!file) return;
      const reader = new FileReader();
      reader.onload = ev => {
        let parsed; try { parsed = JSON.parse(ev.target.result); } catch(err) { onError('Invalid JSON file.'); return; }
        if (!parsed.bills && !parsed.settings) { onError('Not a Yorbil backup file.'); return; }
        backup(localStorage.getItem(PROD_KEY));
        if (!parsed.version || parsed.version < SCHEMA_VER) parsed = migrateV1(parsed);
        onSuccess(parsed);
      };
      reader.readAsText(file);
    }; inp.click();
  }

  function storageStatus() {
    const raw = localStorage.getItem(PROD_KEY);
    const size = raw ? (raw.length/1024).toFixed(1)+'KB' : '—';
    const backups = Object.keys(localStorage).filter(k=>k.startsWith(BACKUP_PFX)).sort().reverse()
      .map(k=>({key:k, ts:parseInt(k.replace(BACKUP_PFX,''))}));
    return { size, backups };
  }

  return { load, save, exportJSON, importJSON, backup, storageStatus, SCHEMA_VER };
})();

const DAYS_F = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const FREQS  = ['WEEKLY','FORTNIGHTLY','MONTHLY','QUARTERLY','YEARLY'];
const COLORS = ['#4a9fff','#8b5cf6','#0fb8a0','#e09a1a','#e05555','#2ec87a'];

let S = null, NID = 100, BILL_SEARCH = '';
const nid = () => NID++;

    settings:{ householdName:'', incomes:[], sharedAllocs:[] },

}

let saveDot, saveTimer;
function autoSave() {
  if (saveDot) saveDot.style.background='var(--amber)';
  clearTimeout(saveTimer); S.nid = NID;
  saveTimer = setTimeout(() => { STORAGE.save(S); if(saveDot) saveDot.style.background='var(--green)'; }, 600);

// ── Action history ────────────────────────────────────────────────────────────
function saveAction(description, snapshot) {
  if (!S.actionLog) S.actionLog = [];
  S.actionLog.unshift({
    id: nid(),
    date: today(),
    ts: Date.now(),
    description,
    snapshot: JSON.stringify(snapshot)
  });
  // Keep last 20 actions, expire after 14 days
  const cutoff = Date.now() - 14 * 864e5;
  S.actionLog = S.actionLog.filter(a => a.ts > cutoff).slice(0, 20);
}

function undoAction(id) {
  const entry = (S.actionLog||[]).find(a => a.id===id);
  if (!entry) return;
  // Check if it's the most recent action (only allow sequential undo)
  if (S.actionLog[0].id !== id) {
    alert('You can only undo the most recent action. Undo later actions first.');
    return;
  }
  if (!confirm(`Undo "${entry.description}"? This will restore the previous state.`)) return;
  const snap = JSON.parse(entry.snapshot);
  // Restore snapshotted fields
  if (snap.bills)   S.bills   = snap.bills;
  if (snap.loans)   S.loans   = snap.loans;
  if (snap.leaks)   S.leaks   = snap.leaks;
  if (snap.oneoffs) S.oneoffs = snap.oneoffs;
  // Remove this action from log
  S.actionLog = S.actionLog.filter(a => a.id !== id);
  autoSave(); render();
  alert('Undone successfully.');
}

// ── Date helpers ──────────────────────────────────────────────────────────────
const $       = id => document.getElementById(id);
const fmt     = n => '$'+Math.abs(+n||0).toLocaleString('en-AU',{minimumFractionDigits:2,maximumFractionDigits:2});
const fmtD    = d => { if(!d)return'—'; return new Date(d+'T00:00:00').toLocaleDateString('en-AU',{day:'numeric',month:'short'}); };
const fmtDY   = d => { if(!d)return'—'; return new Date(d+'T00:00:00').toLocaleDateString('en-AU',{day:'numeric',month:'short',year:'numeric'}); };
// today() and addDays() defined at top of script
const addMonths = (d,n) => {
  const dt = new Date(d+'T00:00:00');
  dt.setMonth(dt.getMonth()+n);
  const y = dt.getFullYear();
  const m = String(dt.getMonth()+1).padStart(2,'0');
  const day = String(dt.getDate()).padStart(2,'0');
  return y+'-'+m+'-'+day;
};
const daysBetween = (a,b) => Math.round((new Date(b+'T00:00:00')-new Date(a+'T00:00:00'))/864e5);

// ── Person window — uses explicit cycleStart / cycleEnd set by user ───────────
function personWindow(person) {
  return { start: person.cycleStart || today(), end: person.cycleEnd || addDays(today(),6) };
}

// ── Bill helpers ──────────────────────────────────────────────────────────────
function nextDue(b) {
  if (!b.lastDue) return null;
  if (b.freq==='WEEKLY')      return addDays(b.lastDue,7);
  if (b.freq==='FORTNIGHTLY') return addDays(b.lastDue,14);
  if (b.freq==='MONTHLY')     return addMonths(b.lastDue,1);
  if (b.freq==='QUARTERLY')   return addMonths(b.lastDue,3);
  if (b.freq==='YEARLY')      return addMonths(b.lastDue,12);
  return null;
}

function advanceOne(freq, d) {
  if (freq==='WEEKLY')      return addDays(d,7);
  if (freq==='FORTNIGHTLY') return addDays(d,14);
  if (freq==='MONTHLY')     return addMonths(d,1);
  if (freq==='QUARTERLY')   return addMonths(d,3);
  if (freq==='YEARLY')      return addMonths(d,12);
  return d;
}

function billOccurrenceInWindow(b, ws, we) {
  if (!b.lastDue) return null;
  // Start from the NEXT occurrence after lastDue (lastDue itself is already paid)
  let d = advanceOne(b.freq, b.lastDue);
  for (let i = 0; i < 500; i++) {
    if (d > we) break;
    if (d >= ws) return d;
    d = advanceOne(b.freq, d);
  }
  return null;
}

// Count how many cycles missed since lastDue
function missedCycles(b) {
  if (!b.lastDue) return 0;
  const t = today();
  let d = b.lastDue, count = 0;
  for (let i = 0; i < 500; i++) {
    const next = advanceOne(b.freq, d);
    if (next > t) break;
    count++; d = next;
  }
  return count;
}

function billsInWindow(ws, we) {
  const items = [];
  S.bills.filter(b => b.include && !b.missed).forEach(b => {
    const nd = billOccurrenceInWindow(b, ws, we);
    if (nd) items.push({ name:b.name, nd, amount:b.amount, type:'bill', id:b.id });
  });
  S.variables.filter(v => v.inDueList).forEach(v => {
    const wkAmt = weeklyAmt(v);
    if (wkAmt > 0) {
      const target = v.dayOfWeek || 1;
      for (let i = 0; i <= 7; i++) {
        const dt = new Date(ws+'T00:00:00'); dt.setDate(dt.getDate()+i);
        const d = dt.toISOString().split('T')[0];
        if (d > we) break;
        if (dt.getDay() === target) { items.push({ name:v.name, nd:d, amount:wkAmt, type:'var', id:v.id }); break; }
      }
    }
  });
  S.oneoffs.filter(o => o.include && !o.paid && o.due && o.due >= ws && o.due <= we)
    .forEach(o => items.push({ name:o.name, nd:o.due, amount:+(o.actualAmount)||o.amount, type:'oneoff', id:o.id, displayOnly:true }));
  return items.sort((a,b) => a.nd.localeCompare(b.nd));
}

function weeklyAmt(v) {
  if (v.freq==='WEEKLY')      return v.amount;
  if (v.freq==='FORTNIGHTLY') return v.amount/2;
  if (v.freq==='MONTHLY')     return v.amount*12/52;
  return 0;
}

function oneoffsInWindow(ws, we, who) {
  return S.oneoffs.filter(o => {
    if (!o.include || o.paid || !o.due) return false; // paid oneoffs excluded from totals
    if (who && o.who !== who && o.who !== 'HOUSEHOLD') return false;
    return o.due >= ws && o.due <= we;
  }).reduce((s,o) => s+(+(o.actualAmount)||o.amount), 0); // use actual spend if entered
}

function leaksInWindow(ws, we) {
  return S.leaks.filter(l => l.date >= ws && l.date <= we).reduce((s,l) => s+l.amount, 0);
}

function dayPill(nd) {
  if (!nd) return '<span class="pill p-gray">—</span>';
  const t = today();
  if (nd === t)   return '<span class="pill p-a">Today</span>';
  const diff = daysBetween(t, nd);
  if (diff < 0)   return `<span class="pill p-r">${Math.abs(diff)}d late</span>`;
  if (diff <= 3)  return `<span class="pill p-a">${diff}d</span>`;
  if (diff <= 7)  return `<span class="pill p-b">${diff}d</span>`;
  return `<span class="pill p-gray">${diff}d</span>`;
}

// Sorted bill list: pinned first, then date order
function sortedBills() {
  const pinned   = S.bills.filter(b => b.pinned).sort((a,b) => (nextDue(a)||'').localeCompare(nextDue(b)||''));
  const unpinned = S.bills.filter(b => !b.pinned).sort((a,b) => {
    const na=nextDue(a)||'9999', nb=nextDue(b)||'9999'; return na.localeCompare(nb);
  });
  return [...pinned, ...unpinned];
}

// ══════════════════════════════════════════════════════════════════════════════
// DASHBOARD
// ══════════════════════════════════════════════════════════════════════════════
function dashH() {
  const isDesktop = window.innerWidth >= 768;
  const inc = S.settings.incomes;
  const sharedAlloc = S.settings.sharedAllocs.reduce((s,a)=>s+a.amount, 0);
  const t = today();

  // Active person = whose window contains today, or most recently ended
  const windows = inc.map(p => personWindow(p));
  let activeIdx = 0;
  for (let i = 0; i < inc.length; i++) {
    if (t >= windows[i].start && t <= windows[i].end) { activeIdx = i; break; }
    if (t > windows[i].end) activeIdx = i;
  }

  // Reorder: active person first, others follow
  const order = [activeIdx, ...inc.map((_,i)=>i).filter(i=>i!==activeIdx)];

  // Arrears warning — bills with active payment plans
  const arrearsBills = S.bills.filter(b => b.paymentPlan && Math.max(0,b.paymentPlan.debt-b.paymentPlan.paid) > 0);
  let arrearsBanner = '';
  if (arrearsBills.length) {
    const totalArrears = arrearsBills.reduce((s,b)=>s+Math.max(0,b.paymentPlan.debt-b.paymentPlan.paid),0);
    arrearsBanner = `<div style="background:var(--red-d);border:0.5px solid var(--red);border-radius:10px;margin:6px 14px;padding:10px 14px;display:flex;align-items:center;gap:8px">
      <span style="font-size:16px">⚠</span>
      <div style="flex:1">
        <div style="font-size:13px;font-weight:700;color:var(--red-t)">Payment plan in progress — ${fmt(totalArrears)} total arrears</div>
        <div style="font-size:11px;color:var(--text2);margin-top:2px">${arrearsBills.map(b=>`${b.name}: ${fmt(Math.max(0,b.paymentPlan.debt-b.paymentPlan.paid))} owing`).join(' · ')}</div>
      </div>
      <button class="btn sm" onclick="goPage('bills')" style="flex-shrink:0">View</button>
    </div>`;
  }

  // Missed bills warning
  const missedBills = S.bills.filter(b => b.missed);
  let missedBanner = '';
  if (missedBills.length) {
    missedBanner = `<div style="background:var(--red-d);border:0.5px solid var(--red);border-radius:10px;margin:6px 14px;padding:10px 14px;display:flex;align-items:center;gap:8px">
      <span style="font-size:16px">⚠</span>
      <div>
        <div style="font-size:13px;font-weight:700;color:var(--red-t)">${missedBills.length} missed bill${missedBills.length>1?'s':''} — action needed</div>
        <div style="font-size:11px;color:var(--text2);margin-top:2px">${missedBills.map(b=>b.name).join(', ')}</div>
      </div>
      <button class="btn sm" onclick="goPage('bills')" style="margin-left:auto;flex-shrink:0">View</button>
    </div>`;
  }

  // Shortfall warning — bills due in next 48hrs
  let shortfallBanner = '';
  const in48 = addDays(t, 2);
  // Check upcoming bills AND one-offs due in next 48hrs
  const upcomingBills = S.bills.filter(b => {
    if (!b.include || b.missed) return false;
    const nd = nextDue(b); return nd && nd >= t && nd <= in48;
  });
  const upcomingOneoffs = S.oneoffs.filter(o => {
    return o.include && !o.paid && o.due && o.due >= t && o.due <= in48;
  });
  const upcomingAll = [
    ...upcomingBills.map(b => ({ name:b.name, amount:b.amount, nd:nextDue(b), type:'bill' })),
    ...upcomingOneoffs.map(o => ({ name:o.name, amount:+(o.actualAmount)||o.amount, nd:o.due, type:'oneoff' }))
  ];
  if (upcomingAll.length && inc.length > 0) {
    const activePerson = inc[activeIdx];
    const aw = windows[activeIdx];
    const bank = +(activePerson.bank||0);
    let availableBalance;
    if (bank > 0) {
      // Bank balance minus everything still to come out today and onwards
      const billItems = billsInWindow(aw.start, windows[activeIdx].end);
      const futureBills = billItems.filter(b => b.type !== 'oneoff' && b.nd >= t).reduce((s,b)=>s+b.amount,0);
      const futureOneoffs = S.oneoffs.filter(o => o.include && !o.paid && o.due >= t && o.due >= aw.start && o.due <= aw.end).reduce((s,o)=>s+(+(o.actualAmount)||o.amount),0);
      availableBalance = bank - futureBills - futureOneoffs;
    } else {
      const billItems = billsInWindow(aw.start, aw.end);
      const billTotal = billItems.filter(b => b.type !== 'oneoff').reduce((s,i)=>s+i.amount,0);
      const leaks = leaksInWindow(aw.start, aw.end);
      const oneoffs = oneoffsInWindow(aw.start, aw.end, activePerson.name.toUpperCase());
      availableBalance = activePerson.amount - billTotal - oneoffs - leaks - (activePerson.alloc||0) - sharedAlloc;
    }
    const shortfalls = upcomingAll.filter(item => availableBalance - item.amount < 0);
    if (shortfalls.length) {
      shortfallBanner = shortfalls.map(item => {
        const diff = daysBetween(t, item.nd);
        const shortAmt = Math.abs(availableBalance - item.amount);
        const typeTag = item.type === 'oneoff' ? ' <span style="font-size:10px;opacity:.8">(one-off)</span>' : '';
        return `<div style="background:var(--amber-d);border:0.5px solid var(--amber);border-radius:10px;margin:4px 14px;padding:10px 14px;font-size:12px;color:var(--amber-t)">
          ⚠ <strong>${item.name}</strong>${typeTag} ${fmt(item.amount)} due ${diff===0?'today':diff===1?'tomorrow':'in '+diff+'d'} — you may be <strong>${fmt(shortAmt)} short</strong>
        </div>`;
      }).join('');
    }
  }

  let blocks = '', wbCards = '', rollovers = '', rollover = 0;
  
  order.forEach((personIdx, i) => {
    const person = inc[personIdx];
    const { start, end } = windows[personIdx];
    const nextPersonIdx = order[i+1] !== undefined ? order[i+1] : null;
    const nextStart = nextPersonIdx !== null ? windows[nextPersonIdx].start : null;
    // Use cycleEnd when cycles share a boundary day, gap-fill only when there's a real gap
    const extEnd = nextStart && nextStart > addDays(end, 1) ? addDays(nextStart, -1) : end;

    const billItems     = billsInWindow(start, extEnd);
    // Boundary bills: due on this cycle's start date AND prev person's cycle end date
    // These are already covered by the previous person — show flagged but don't deduct
    const prevPerson    = i > 0 ? inc[order[i-1]] : null;
    const prevCycleEnd  = prevPerson ? personWindow(prevPerson).end : null;
    const boundaryBills = (prevCycleEnd && prevCycleEnd === start)
      ? billItems.filter(b => b.nd === start)
      : [];
    const boundaryIds   = new Set(boundaryBills.map(b => b.id));
    const boundaryAmt   = boundaryBills.reduce((s,b) => s+b.amount, 0);
    const billTotal     = billItems.reduce((s,b) => (boundaryIds.has(b.id) || b.type==='oneoff') ? s : s+b.amount, 0);
    const oneoffs       = oneoffsInWindow(start, extEnd, person.name.toUpperCase());
    const leaks         = leaksInWindow(start, extEnd);
    const personalAlloc = +(person.alloc||0);
    const openingPot    = rollover + person.amount;
    const totalOut      = billTotal + oneoffs + leaks + personalAlloc + (i===0 ? sharedAlloc : 0);
    const left          = openingPot - totalOut;
    const over          = left < 0;
    const c             = person.color || 'var(--blue)';
    const isActive      = personIdx === activeIdx;

    // Projected vs actual bank
    const projected = openingPot - billTotal - oneoffs - personalAlloc - (i===0 ? sharedAlloc : 0);
    const bank      = +(person.bank||0);
    const bankDiff  = bank > 0 ? bank - projected : null;
    // Bills still to come out = bills due AFTER today in this window
    const t2 = today();
    const remainingBills = bank > 0
      ? billItems.filter(b => !boundaryIds.has(b.id) && b.type!=='oneoff' && b.nd > t2).reduce((s,b)=>s+b.amount,0)
      : 0;
    const remainingOneoffs = bank > 0
      ? S.oneoffs.filter(o => o.include && !o.paid && o.due > t2 && o.due >= start && o.due <= extEnd
          && (o.who === person.name.toUpperCase() || o.who === 'HOUSEHOLD')).reduce((s,o)=>s+(+(o.actualAmount)||o.amount),0)
      : 0;
    // displayLeft: if bank entered → bank minus bills/oneoffs still to come out
    // if no bank → use full projected calculation
    const displayLeft = bank > 0 ? Math.max(0, bank - remainingBills - remainingOneoffs) : left;
    const displayOver = displayLeft < 0;
    const displayLeftColor = displayOver ? 'var(--red-t)' : 'var(--green-t)';
    const diffColor   = bankDiff!==null && bankDiff<0 ? 'var(--red-t)' : 'var(--green-t)';
    const diffPrefix  = bankDiff!==null && bankDiff>=0 ? '+' : '';

    if (i > 0 && rollover > 0) {
      const rv = `<div class="rollover" style="text-align:center">↓ ${fmt(rollover)} rolls from ${inc[order[i-1]].name} into ${person.name}'s week →</div>`;
      blocks += rv;
      rollovers += rv;
    }

    blocks += `<div class="wb" style="border-color:${c}60;overflow:hidden" >
      <div class="wb-hd" style="border-bottom:2px solid var(--border);border-left:4px solid ${c}">
        <div>
          <div class="wb-title" style="color:${c}">${person.name}'s week${isActive?' <span style="font-size:9px;background:'+c+'30;color:'+c+';padding:2px 6px;border-radius:99px;font-weight:700;vertical-align:middle;margin-left:4px">NOW</span>':''}</div>
          <div class="wb-dates">${fmtD(start)} – ${fmtD(end)}</div>
        </div>
        <div style="text-align:right">
          <div style="font-size:20px;font-weight:700;font-family:var(--fm);color:${c}">${fmt(person.amount)}</div>
          <div style="font-size:11px;color:var(--text2)">income this cycle</div>
        </div>
      </div>
      ${i>0 && rollover>0 ? `<div style="padding:8px 14px;font-size:12px;color:var(--teal-t);background:var(--teal-d);border-bottom:1px solid var(--border);border-left:4px solid var(--teal)">Opening pot: ${fmt(rollover)} + ${fmt(person.amount)} = <strong>${fmt(openingPot)}</strong></div>` : ''}
      ${displayOver ? `<div class="overspend" style="margin:0;border-radius:0;border-left:4px solid var(--red)">⚠ Overspend — ${fmt(Math.abs(left))} over budget this cycle</div>` : ''}
      <div style="padding:0 14px;border-bottom:2px solid var(--border);border-left:4px solid ${c};background:var(--bg2)">
        <div class="row" style="padding-left:0;padding-right:0"><span class="row-lbl" style="color:var(--text)">Bills this cycle</span><span class="row-amt" style="color:var(--red-t)">−${fmt(billTotal)}</span></div>
        ${oneoffs>0 ? `<div class="row" style="padding-left:0;padding-right:0"><span class="row-lbl" style="color:var(--text)">One-offs</span><span class="row-amt" style="color:var(--red-t)">−${fmt(oneoffs)}</span></div>` : ''}
        ${leaks>0   ? `<div class="row" style="padding-left:0;padding-right:0"><span class="row-lbl" style="color:var(--text)">Leakages</span><span class="row-amt" style="color:var(--amber-t)">−${fmt(leaks)}</span></div>` : ''}
        ${personalAlloc>0 ? `<div class="row" style="padding-left:0;padding-right:0"><span class="row-lbl" style="color:var(--text)">Personal alloc</span><span class="row-amt" style="color:var(--text2)">−${fmt(personalAlloc)}</span></div>` : ''}
        ${sharedAlloc>0 ? `<div class="row" style="padding-left:0;padding-right:0;border-bottom:none"><span class="row-lbl" style="color:var(--text)">Shared allocs</span><span class="row-amt" style="color:var(--text2)">−${fmt(sharedAlloc)}</span></div>` : ''}
      </div>
      <div class="leftover-row" style="border-bottom:2px solid var(--border);border-left:4px solid ${c}">
        <span class="leftover-lbl">Left end of cycle</span>
        <span class="leftover-amt" style="color:${displayLeftColor}">${fmt(displayLeft)}</span>
      </div>
      <div style="background:var(--bg3);padding:12px 14px;display:grid;grid-template-columns:1fr 1fr;gap:8px;border-left:4px solid ${c}">
        <div>
          <div style="font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--text3);margin-bottom:3px">Projected (no leaks)</div>
          <div style="font-size:16px;font-weight:600;font-family:var(--fm);color:var(--blue-t)">${fmt(projected)}</div>
        </div>
        <div>
          <div style="font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--text3);margin-bottom:3px">Actual bank</div>
          ${bank>0 ? `<div style="font-size:16px;font-weight:600;font-family:var(--fm);color:var(--text)">${fmt(bank)}</div>
          ${bankDiff!==null ? `<div style="font-size:11px;color:${diffColor};margin-top:2px">${diffPrefix}${fmt(bankDiff)} vs projected</div>` : ''}` :
          `<div style="font-size:12px;color:var(--text3);margin-top:4px">Enter in Setup →</div>`}
        </div>
      </div>
      ${!displayOver && i<order.length-1 ? `<div style="padding:8px 14px 10px;font-size:11px;color:var(--text3);background:var(--bg3);border-left:4px solid ${c}">${fmt(displayLeft)} carries into ${inc[order[i+1]].name}'s cycle</div>` : ''}
    </div>`;

    // On desktop, wbCards is extracted after forEach (strips rollover banners)
    rollover = displayOver ? 0 : Math.max(0, displayLeft);
  });
  // On desktop, strip rollover banners from blocks for the grid (they go above)
  if (isDesktop) {
    wbCards = blocks.replace(/<div class="rollover"[^>]*>[\s\S]*?<\/div>/g, '');
  }

  // Per-person cycle due lists (replaces fixed week/next-week view)
  function dueListForCycle(items, coveredBillIds) {
    coveredBillIds = coveredBillIds || new Set();
    if (!items.length) return '<div class="empty">Nothing due this cycle</div>';
    let h = '<div>';
    items.forEach(item => {
      const isCovered = coveredBillIds.has(item.id);
      h += `<div class="row" style="${isCovered?'opacity:0.65':''}">
        <div class="row-l">
          <div class="row-lbl">${item.name}${item.type==='var'?' <span class="pill p-gray" style="font-size:9px">var</span>':item.type==='oneoff'?' <span class="pill p-p" style="font-size:9px">one-off</span>':''}${isCovered?' <span class="pill p-t" style="font-size:9px">⚑ Sam covers</span>':''}</div>
          <div class="row-sub">${fmtD(item.nd)}</div>
        </div>
        <div class="row-r"><div class="row-amt" style="${isCovered?'color:var(--text3)':'color:var(--text)'}">${fmt(item.amount)}</div>${dayPill(item.nd)}</div>
      </div>`;
    });
    const billsOnly = items.filter(i=>i.type!=='oneoff'&&!coveredBillIds.has(i.id)).reduce((s,i)=>s+i.amount,0);
    const oneoffOnly = items.filter(i=>i.type==='oneoff').reduce((s,i)=>s+i.amount,0);
    h += `<div class="row" style="background:var(--bg3)">
      <span style="font-size:12px;font-weight:600;color:var(--text2)">Bills total</span>
      <span style="font-family:var(--fm);font-weight:700;color:var(--blue-t)">${fmt(billsOnly)}</span>
    </div>`;
    if (oneoffOnly > 0) {
      h += `<div class="row" style="background:var(--bg3)">
        <span style="font-size:12px;font-weight:600;color:var(--text2)">One-offs total</span>
        <span style="font-family:var(--fm);font-weight:700;color:var(--purple-t)">${fmt(oneoffOnly)}</span>
      </div>`;
    }
    h += '</div>';
    return h;
  }

  const totalSaved = S.goals.reduce((s,g)=>s+g.saved,0);
  const totalLoans = S.loans.reduce((s,l)=>s+l.current,0);

const blockWrapOpen  = isDesktop ? `<div class="dt-income-grid${order.length===1?' single':''}" >` : '';
  const blockWrapClose = isDesktop ? '</div>' : '';
  return `<div class="pg-hdr">
    <div>${logoHTML()}</div>
    <div style="display:flex;align-items:center;gap:6px">
      <div id="sdot" class="sdot"></div>
      <span style="font-size:10px;color:var(--text3)">${new Date().toLocaleDateString('en-AU',{weekday:'short',day:'numeric',month:'short'})}</span>
      <button class="btn sm" onclick="generateStatement()" style="font-size:10px;padding:4px 8px">⬇ Statement</button>
    </div>
  </div>
  ${inc.length===0 ? '<div class="alert-info" style="margin-top:10px">Welcome! Go to <strong>Setup</strong> to add your household details.</div>' : ''}
  <div class="${isDesktop?'dt-banner':''} ">${arrearsBanner}${missedBanner}${shortfallBanner}</div>
  ${isDesktop ? '<div class="dt-rollover-bar">'+rollovers+'</div>' : ''}
  ${blockWrapOpen}${isDesktop ? wbCards : blocks}${blockWrapClose}
  ${isDesktop?'<div class="dt-due-grid">':''}
  ${order.map((pi, oi) => {
    const p = inc[pi];
    const pw = windows[pi];
    const nextPi = order[oi+1] !== undefined ? order[oi+1] : null;
    const nextPiStart = nextPi !== null ? windows[nextPi].start : null;
    const extE = nextPiStart && nextPiStart > addDays(pw.end,1) ? addDays(nextPiStart,-1) : pw.end;
    const items = billsInWindow(pw.start, extE);
    const c = p.color || 'var(--blue)';
    // Bills that start on this cycle's start date but were also the prev cycle's end — mark as covered
    const prevPi = oi > 0 ? order[oi-1] : null;
    const prevEnd = prevPi !== null ? windows[prevPi].end : null;
    const coveredIds = new Set(
      (prevEnd && prevEnd === pw.start)
        ? items.filter(b => b.nd === pw.start).map(b => b.id)
        : []
    );
    const prevName = prevPi !== null ? inc[prevPi].name : '';
    // Replace generic "Sam covers" with actual name
    return `<div>
      <div class="sec-lbl" style="color:${c};padding:0;margin-bottom:6px">${p.name}'s cycle — ${fmtD(pw.start)} to ${fmtD(pw.end)}</div>
      <div class="card" style="margin:0">${dueListForCycle(items, coveredIds).replace(/⚑ Sam covers/g, '⚑ '+prevName+' covers')}</div>
    </div>`;
  }).join('')}
  ${isDesktop?'</div>':''}
  <div class="${isDesktop?'dt-savings-gap':''}" style="display:grid;grid-template-columns:1fr 1fr;gap:0;margin:6px 14px">
    <div class="card" style="margin:0 4px 0 0;border-radius:14px">
      <div class="card-hd"><span class="card-hd-t" style="color:var(--green-t)">Savings</span></div>
      ${S.goals.length
        ? S.goals.map(g=>{const p=g.target>0?Math.min(100,Math.round(g.saved/g.target*100)):0;return`<div class="row">
          <div class="row-l" style="max-width:90px"><div class="row-lbl" style="font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${g.name}</div>
          <div class="pb"><div class="pb-fill" style="width:${p}%"></div></div></div>
          <span class="pill p-${p>=100?'g':p>0?'b':'gray'}">${p}%</span>
        </div>`;}).join('')+`<div class="row"><span style="font-size:11px;color:var(--text2)">Total</span><span style="font-family:var(--fm);font-size:13px;font-weight:600;color:var(--green-t)">${fmt(totalSaved)}</span></div>`
        : '<div class="empty" style="padding:12px 14px">No goals yet</div>'}
    </div>
    <div class="card" style="margin:0 0 0 4px;border-radius:14px">
      <div class="card-hd"><span class="card-hd-t" style="color:var(--red-t)">Loans</span></div>
      ${S.loans.length
        ? S.loans.map(l=>{const p=l.original>0?Math.min(100,Math.round((1-l.current/l.original)*100)):0;return`<div class="row">
          <div class="row-l" style="max-width:90px"><div class="row-lbl" style="font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${l.name}</div>
          <div class="pb"><div class="pb-fill" style="width:${p}%;background:var(--blue)"></div></div></div>
          <span class="pill p-gray">${p}%</span>
        </div>`;}).join('')+`<div class="row"><span style="font-size:11px;color:var(--text2)">Total</span><span style="font-family:var(--fm);font-size:13px;font-weight:600;color:var(--red-t)">${fmt(totalLoans)}</span></div>`
        : '<div class="empty" style="padding:12px 14px">No loans yet</div>'}
    </div>
  </div>
  <div style="height:8px"></div>`;
}

// ══════════════════════════════════════════════════════════════════════════════
// BILLS TAB
// ══════════════════════════════════════════════════════════════════════════════
function billsH() {
  const sorted = sortedBills();
  const windows = S.settings.incomes.map(p => personWindow(p));

  // Build handover-aware bill list
  function billRowsWithHandover(bills) {
    if (!bills.length) return '<div class="empty">No bills yet — tap + Add</div>';
    let html = '', lastOwnerIdx = -1;
    bills.forEach(b => {
      const nd = nextDue(b);
      const hist = b.paidHistory||[];
      const la = hist.length ? hist[hist.length-1].actual : null;

      // Find owner
      let ownerIdx = -1;
      if (nd) {
        for (let pi = 0; pi < S.settings.incomes.length; pi++) {
          const pw = windows[pi];
          if (nd >= pw.start && nd <= pw.end) { ownerIdx = pi; break; }
        }
      }

      if (ownerIdx !== -1 && ownerIdx !== lastOwnerIdx && lastOwnerIdx !== -1) {
        const owner = S.settings.incomes[ownerIdx];
        const c = owner.color || 'var(--blue)';
        html += `<div style="padding:7px 14px;font-size:10px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:${c};background:${c}15;border-top:1.5px solid ${c}40;border-bottom:1.5px solid ${c}40">
          ${owner.name} takes over from here
        </div>`;
      }
      lastOwnerIdx = ownerIdx;

      html += `<div class="bill-row" id="bill-row-${b.id}" data-bill-name="${b.name}">
        <div class="bill-row-top">
          <div class="row-l">
            <div class="row-lbl">
              ${b.pinned ? '<span style="color:var(--amber-t);margin-right:3px;font-size:11px">📌</span>' : ''}
              ${b.name}
              ${b.missed ? '<span class="pill p-r" style="font-size:9px;margin-left:4px">MISSED</span>' : ''}
              ${b.linkedLoanId ? '<span class="pill p-b" style="font-size:9px;margin-left:4px">LOAN</span>' : ''}
              ${b.paymentPlan ? `<span class="pill p-r" style="font-size:9px;margin-left:4px">⚠ ${fmt(Math.max(0,b.paymentPlan.debt-b.paymentPlan.paid))} arrears</span>` : ''}
            </div>
            <div class="row-sub">${b.freq}${nd?' · due '+fmtD(nd):''}${la?' · last paid '+fmtD(la):''}</div>
          </div>
          <div class="bill-row-amt">
            <div class="row-amt">${fmt(b.amount)}</div>
            ${b.missed?'<span class="pill p-r" style="font-size:9px">frozen</span>':dayPill(nd)}
          </div>
        </div>
        <div class="bill-row-actions">
          <div class="tog${b.include&&!b.missed?' on':''}" onclick="togBill(${b.id})" title="Include"><div class="tog-dot"></div></div>
          ${b.missed
            ? `<button class="bill-btn green" onclick="retryModal(${b.id})" title="Retry payment">✓ Retry</button>`
            : `<button class="bill-btn green" onclick="markPaid(${b.id})" title="Mark paid">✓ Paid</button>`}
          ${b.missed
            ? `<button class="bill-btn teal" onclick="unMissed(${b.id})" title="Unfreeze">↺ Unfreeze</button>`
            : `<button class="bill-btn amber" onclick="markMissed(${b.id})" title="Mark missed">! Missed</button>`}
          ${b.missed
            ? `<button class="bill-btn" style="color:var(--blue-t);border-color:var(--blue-d)" onclick="paymentPlanModal(${b.id})" title="Start payment plan">⚖ Plan</button>`
            : b.paymentPlan
              ? `<button class="bill-btn" style="color:var(--red-t);border-color:var(--red-d)" onclick="viewPaymentPlan(${b.id})" title="View payment plan">$ Arrears</button>`
              : ''}
          <button class="bill-btn" onclick="togglePin(${b.id})" title="Pin">${b.pinned?'★':'☆'}</button>
          <button class="bill-btn" onclick="billModal(${b.id})" title="Edit">✎</button>
          <button class="bill-btn" onclick="histModal(${b.id})" title="History">⏱</button>
          <button class="bill-btn red" onclick="delBill(${b.id})" title="Delete">✕</button>
        </div>
      </div>`;
    });
    return html;
  }

  return `<div class="pg-hdr"><div><div class="pg-title">Bills</div></div><button class="btn sm primary" onclick="billModal()">+ Add</button></div>
  <div class="card card-p" style="padding:10px 14px">
    <input type="text" id="bill-search" placeholder="🔍  Search bills..."
      oninput="BILL_SEARCH=this.value;filterBillList();"
      value="${BILL_SEARCH||''}"
      style="border-radius:99px;padding:8px 14px;font-size:13px;width:100%">
  </div>
  <div class="card">
    <div class="card-hd"><span class="card-hd-t" style="color:var(--blue-t)">Recurring bills</span></div>
    <div id="bill-list">${billRowsWithHandover(sorted.filter(b => {
      return !BILL_SEARCH || b.name.toLowerCase().includes(BILL_SEARCH.toLowerCase());
    }))}</div>
  </div>
  <div class="sec-lbl">Variable budgets</div>
  <div class="card">
    <div class="card-hd"><span class="card-hd-t" style="color:var(--amber-t)">Variables</span><button class="btn sm" onclick="varModal()">+ Add</button></div>
    ${S.variables.length ? S.variables.map(v=>{
      const hist=v.history||[];
      const lastEntry=hist.length?hist[hist.length-1]:null;
      const avgActual=hist.length?Math.round(hist.reduce((s,h)=>s+h.actual,0)/hist.length):null;
      return `<div class="row">
      <div class="row-l">
        <div class="row-lbl">${v.name}</div>
        <div class="row-sub">${v.freq} · ${DAYS_F[v.dayOfWeek||1]} · ${fmt(weeklyAmt(v))}/wk${lastEntry?` · last actual ${fmt(lastEntry.actual)}`:''}${avgActual&&avgActual!==v.amount?` · avg ${fmt(avgActual)}`:''}
        </div>
      </div>
      <div class="row-r" style="flex-direction:row;align-items:center;gap:4px">
        <div class="row-amt">${fmt(v.amount)}</div>
        <button class="btn-icon" onclick="markVarPaid(${v.id})" title="Log actual spend" style="color:var(--green-t)">✓</button>
        <div class="tog${v.inDueList?' on':''}" onclick="togVar(${v.id})" title="Show in due list"><div class="tog-dot"></div></div>
        <button class="btn-icon" onclick="varModal(${v.id})">✎</button>
        <button class="btn-icon" onclick="delVar(${v.id})" style="color:var(--red-t)">✕</button>
      </div>
    </div>`;}).join('') : '<div class="empty">No variables yet</div>'}
  </div>
  <div class="sec-lbl">One-off expenses</div>
  <div class="card">
    <div class="card-hd"><span class="card-hd-t" style="color:var(--purple-t)">One-offs</span><button class="btn sm" onclick="oneoffModal()">+ Add</button></div>
    ${S.oneoffs.length ? [...S.oneoffs].sort((a,b)=>{
      if(a.paid&&!b.paid)return 1;if(b.paid&&!a.paid)return -1;
      return (a.due||'9999').localeCompare(b.due||'9999');
    }).map(o=>`<div class="row">
      <div class="row-l">
        <div class="row-lbl">${o.name} ${o.paid?'<span class="pill p-g" style="font-size:9px">✓ PAID</span>':''}</div>
        <div class="row-sub">${fmtD(o.due)} · <span class="pill p-${o.who==='HOUSEHOLD'?'t':'p'}" style="font-size:9px">${o.who}</span>${o.paid&&o.actualAmount?` · actual ${fmt(o.actualAmount)}`:''}${o.paid&&o.actualAmount&&o.actualAmount<o.amount?` <span style="color:var(--green-t);font-size:10px">saved ${fmt(o.amount-o.actualAmount)}</span>`:''}</div>
      </div>
      <div class="row-r" style="flex-direction:row;align-items:center;gap:4px">
        <div style="text-align:right"><div class="row-amt" style="${o.paid?'color:var(--text3);text-decoration:line-through':''}">${fmt(o.amount)}</div></div>
        ${o.paid
          ? `<button class="btn-icon" onclick="resetOneoff(${o.id})" title="Mark unpaid" style="color:var(--teal-t)">↺</button>`
          : `<button class="btn-icon" onclick="markOneoffPaid(${o.id})" title="Mark paid" style="color:var(--green-t)">✓</button>`}
        <div class="tog${o.include&&!o.paid?' on':''}" onclick="togOneoff(${o.id})"><div class="tog-dot"></div></div>
        <button class="btn-icon" onclick="oneoffModal(${o.id})">✎</button>
        <button class="btn-icon" onclick="delOneoff(${o.id})" style="color:var(--red-t)">✕</button>
      </div>
    </div>`).join('') : '<div class="empty">No one-offs yet</div>'}
  </div>
  <div style="height:8px"></div>`;
}

// ══════════════════════════════════════════════════════════════════════════════
// LOANS
// ══════════════════════════════════════════════════════════════════════════════
function loansH() {
  return `<div class="pg-hdr"><div><div class="pg-title">Loans</div></div><button class="btn sm primary" onclick="loanModal()">+ Add</button></div>
  ${S.loans.length ? S.loans.map(l=>{
    const rpp={WEEKLY:(+l.rate)/100/52,FORTNIGHTLY:(+l.rate)/100/26,MONTHLY:(+l.rate)/100/12}[l.freq]||0;
    const tp=(+(l.payment)||0)+(+(l.extra)||0);
    const interestPerPeriod = rpp*(+l.current);
    const isUnderwater = rpp>0 && tp<=interestPerPeriod;
    let periods=0;
    if(l.current>0&&tp>0&&!isUnderwater){if(rpp===0)periods=Math.ceil((+l.current)/tp);else{const v=rpp*(+l.current)/tp;if(v<1)periods=Math.ceil(-Math.log(1-v)/Math.log(1+rpp));}}
    const dpp={WEEKLY:7,FORTNIGHTLY:14,MONTHLY:30}[l.freq]||30;
    const payoff=periods>0?addDays(today(),periods*dpp):null;
    const pct=l.original>0?Math.min(100,Math.round((1-l.current/l.original)*100)):0;
    const totalInt=periods>0&&rpp>0?Math.max(0,periods*tp-l.current):0;
    let sched='';
    if(l.current>0&&tp>0){
      let bal=+(l.current);
      const dpp={WEEKLY:7,FORTNIGHTLY:14,MONTHLY:30}[l.freq]||30;
      for(let i=1;i<=6&&bal>0.01;i++){
        const int=rpp>0?bal*rpp:0,pmt=Math.min(tp,bal+int);
        bal=Math.max(0,bal+int-pmt);
        const schedDate=fmtD(addDays(today(),i*dpp));
        sched+=`<tr><td style="color:var(--text3)">${schedDate}</td><td style="text-align:right;color:var(--amber-t)">${fmt(int)}</td><td style="text-align:right">${fmt(pmt)}</td><td style="text-align:right;color:var(--green-t)">${fmt(bal)}</td></tr>`;
      }
    }
    return `<div class="lc">
      <div class="lc-hd"><div><div class="lc-name">${l.name}</div><div class="lc-sub">${l.freq} · ${l.rate}% p.a.</div></div>
        <div class="lc-bal"><div class="lc-cur">${fmt(l.current)}</div><div class="lc-orig">of ${fmt(l.original)}</div></div></div>
      <div class="pb"><div class="pb-fill" style="width:${pct}%;background:var(--blue)"></div></div>
      <div style="font-size:11px;color:var(--text3);text-align:right;margin-bottom:10px">${pct}% paid off</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px">
        <div class="metric"><div class="m-lbl">Regular payment</div><div class="m-val" style="font-size:16px">${fmt(l.payment)}</div></div>
        <div class="metric"><div class="m-lbl">Extra payment${isUnderwater?` · <span style="color:var(--amber-t);font-size:9px">min ${fmt(Math.max(0,interestPerPeriod-tp+1))} extra</span>`:''}
          </div><input type="number" value="${+(l.extra)||0}" style="font-size:16px;font-weight:600;margin-top:4px;color:var(--green-t);border:none;background:transparent;width:100%;padding:0;outline:none" onchange="updExtra(${l.id},+this.value)"></div>
        <div class="metric"><div class="m-lbl">Payoff date</div><div class="m-val g" style="font-size:13px;margin-top:4px">${isUnderwater?'<span style="color:var(--red-t);font-size:11px">⚠ Payment below interest</span>':payoff?fmtDY(payoff):'—'}</div></div>
        <div class="metric"><div class="m-lbl">Total interest</div><div class="m-val a" style="font-size:13px;margin-top:4px">${isUnderwater?'<span style="color:var(--red-t);font-size:11px">Loan growing</span>':fmt(totalInt)}</div></div>
      </div>
      ${sched?`<div style="font-size:10px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--text3);margin-bottom:6px">Next 6 payments</div>
      <table class="sched"><thead><tr><th>#</th><th style="text-align:right">Interest</th><th style="text-align:right">Payment</th><th style="text-align:right">Balance</th></tr></thead><tbody>${sched}</tbody></table>`:''}
      ${(l.paymentHistory&&l.paymentHistory.length)?`
      <div style="font-size:10px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--text3);margin:12px 0 6px">Payment history</div>
      <table class="sched"><thead><tr><th>Date</th><th style="text-align:right">Interest</th><th style="text-align:right">Principal</th><th style="text-align:right">Balance</th></tr></thead>
      <tbody>${[...l.paymentHistory].reverse().slice(0,6).map(h=>`<tr>
        <td style="color:var(--text3)">${fmtD(h.date)}</td>
        <td style="text-align:right;color:var(--amber-t)">${fmt(h.interest)}</td>
        <td style="text-align:right;color:var(--blue-t)">${fmt(h.principal)}</td>
        <td style="text-align:right;color:var(--green-t)">${fmt(h.balance)}</td>
      </tr>`).join('')}</tbody></table>`:''}
      <div style="display:flex;gap:6px;margin-top:12px;flex-wrap:wrap">
        <button class="btn sm" onclick="loanModal(${l.id})">Edit</button>
        <button class="btn sm" onclick="updBalance(${l.id})">Update balance</button>
        <button class="btn sm danger" onclick="delLoan(${l.id})">Delete</button>
      </div></div>`;}).join('') : '<div class="card card-p empty">No loans yet</div>'}
  <div style="height:8px"></div>`;

}

// ══════════════════════════════════════════════════════════════════════════════
// SAVINGS
// ══════════════════════════════════════════════════════════════════════════════
function savingsH() {
  return `<div class="pg-hdr"><div><div class="pg-title">Savings goals</div></div><button class="btn sm primary" onclick="goalModal()">+ Add</button></div>
  ${S.goals.length ? S.goals.map(g=>{
    const pct=g.target>0?Math.min(100,Math.round(g.saved/g.target*100)):0;
    const rem=Math.max(0,g.target-g.saved);
    let rw='—',rf='—',rm='—';
    if(g.targetDate){const d=daysBetween(today(),g.targetDate);if(d>0){rw=fmt(rem/(d/7));rf=fmt(rem/(d/14));rm=fmt(rem/(d/30.4));}}
    return `<div class="gc">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
        <div style="font-size:15px;font-weight:700;color:var(--text)">${g.name}</div>
        <span class="pill p-${pct>=100?'g':pct>0?'b':'gray'}">${pct}%</span>
      </div>
      <div class="pb"><div class="pb-fill" style="width:${pct}%"></div></div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:10px">
        <div class="metric"><div class="m-lbl">Saved</div><input type="number" value="${g.saved}" style="font-size:16px;font-weight:600;margin-top:4px;color:var(--green-t);border:none;background:transparent;width:100%;padding:0;outline:none" onchange="updGoalSaved(${g.id},+this.value)"></div>
        <div class="metric"><div class="m-lbl">Target</div><div class="m-val g" style="font-size:16px">${fmt(g.target)}</div></div>
        <div class="metric"><div class="m-lbl">Remaining</div><div class="m-val a" style="font-size:16px">${fmt(rem)}</div></div>
      </div>
      ${g.targetDate?`<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:8px">
        <div class="metric"><div class="m-lbl">Need/wk</div><div style="font-size:13px;font-weight:600;color:var(--amber-t);margin-top:4px">${rw}</div></div>
        <div class="metric"><div class="m-lbl">Need/FN</div><div style="font-size:13px;font-weight:600;color:var(--amber-t);margin-top:4px">${rf}</div></div>
        <div class="metric"><div class="m-lbl">Need/mo</div><div style="font-size:13px;font-weight:600;color:var(--amber-t);margin-top:4px">${rm}</div></div>
      </div>`:''}
      <div style="display:flex;gap:6px;margin-top:12px;flex-wrap:wrap;align-items:center">
        <input type="date" value="${g.targetDate||''}" style="width:150px;font-size:12px" onchange="updGoalDate(${g.id},this.value)">
        <button class="btn sm" onclick="goalModal(${g.id})">Edit</button>
        <button class="btn sm danger" onclick="delGoal(${g.id})">Delete</button>
      </div>
    </div>`;}).join('') : '<div class="card card-p empty">No goals yet</div>'}
  <div style="height:8px"></div>`;

}

// ══════════════════════════════════════════════════════════════════════════════
// LEAKS

      <span style="font-family:var(--fm);font-weight:700;color:var(--red-t)">${fmt(total)}</span>

  </div>
  <div class="card card-p">

      <div class="ff" style="margin:0"><label>Date</label><input type="date" id="lk-d" value="${today()}"></div>
      <div class="ff" style="margin:0"><label>Amount ($)</label><input type="number" id="lk-a" placeholder="0.00"></div>

  ${sorted.length ? `<div class="card">${sorted.map(l=>`<div class="row">
    <div class="row-l"><div class="row-lbl">${l.category}</div><div class="row-sub">${fmtD(l.date)}${l.note?' · '+l.note:''}</div></div>
    <div class="row-r" style="flex-direction:row;align-items:center;gap:4px">
      <div class="row-amt" style="color:var(--red-t)">${fmt(l.amount)}</div>

  <div style="height:8px"></div>

  ${(S.actionLog||[]).length ? `<div class="card">
    <div class="card-hd"><span class="card-hd-t">Recent actions</span><span style="font-size:11px;color:var(--text3)">${(S.actionLog||[]).length} saved</span></div>
    ${(S.actionLog||[]).map((a,i) => `<div class="row">
      <div class="row-l">
        <div class="row-lbl" style="font-size:13px">${a.description}</div>
        <div class="row-sub">${fmtD(a.date)}${i===0?' · most recent':''}</div>
      </div>
      <div style="flex-shrink:0">
        ${i===0
          ? '<button class="bill-btn teal" onclick="undoAction('+a.id+')">↩ Undo</button>'
          : '<span style="font-size:11px;color:var(--text3);padding:0 4px">undo later first</span>'}
      </div>
    </div>`).join('')}
  </div>` : '<div class="card card-p"><div class="empty">No recent actions. Marking bills paid, missed, or starting payment plans will appear here.</div></div>'}
  <div style="height:8px"></div>`;

}

function settingsH() {
  const inc=S.settings.incomes;
  const status=STORAGE.storageStatus();
  const lastSaved=S.lastSaved?new Date(S.lastSaved).toLocaleString('en-AU'):'Not yet saved';
  return `<div class="pg-hdr"><div><div class="pg-title">Setup</div></div></div>

  <div class="sec-lbl">Appearance</div>
  <div class="card card-p">
    <div class="row" style="padding:0">
      <div class="row-l"><div class="row-lbl">Dark mode</div><div class="row-sub">Toggle dark / light theme</div></div>
      <div class="tog${S.theme==='dark'?' on':''}" onclick="toggleTheme()"><div class="tog-dot"></div></div>
    </div>
  </div>

  <div class="sec-lbl">Household</div>
  <div class="card card-p">
    <div class="ff"><label>Household name</label><input type="text" value="${S.settings.householdName||''}" onchange="S.settings.householdName=this.value;autoSave()"></div>
    <div class="ff" style="margin-bottom:0"><label>Number of income earners</label>
      <select onchange="setIncomeCount(+this.value)">

  </div>
  ${(()=>{
    const t3=today();
    const sortedIdxs=[...Array(inc.length).keys()].sort((a,b)=>{

    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
      <div style="display:flex;align-items:center;gap:8px">
        <div style="font-size:13px;font-weight:700;color:${p.color||'#4a9fff'}">${p.name||'Person '+(i+1)}</div>
        ${isNow?`<span style="font-size:9px;background:${p.color||'#4a9fff'}30;color:${p.color||'#4a9fff'};padding:2px 7px;border-radius:99px;font-weight:700">NOW</span>`:''}
      </div>
      <div style="display:flex;gap:5px">${COLORS.map(c=>`<div onclick="S.settings.incomes[${i}].color='${c}';autoSave();renderKeepScroll()" style="width:18px;height:18px;border-radius:50%;background:${c};cursor:pointer;border:3px solid ${(p.color||COLORS[i])===c?"#fff":"transparent"}"></div>`).join('')}</div>
    </div>
    <div class="ff" style="margin-bottom:8px"><label>Name</label>
      <input type="text" value="${p.name||''}" onchange="S.settings.incomes[${i}].name=this.value;autoSave();renderKeepScroll()">
    </div>
    <div class="f2" style="margin-bottom:8px">
      <div class="ff" style="margin:0"><label>Coverage starts</label>
        <input type="date" value="${p.cycleStart||today()}" onchange="S.settings.incomes[${i}].cycleStart=this.value;autoSave();renderKeepScroll()">
      </div>
      <div class="ff" style="margin:0"><label>Coverage ends</label>
        <input type="date" value="${p.cycleEnd||addDays(today(),6)}" onchange="S.settings.incomes[${i}].cycleEnd=this.value;autoSave();renderKeepScroll()">
      </div>
    </div>
    <div style="font-size:11px;color:var(--text3);margin-bottom:10px;padding:6px 10px;background:var(--bg3);border-radius:8px">
      Coverage: ${p.cycleStart&&p.cycleEnd ? daysBetween(p.cycleStart,p.cycleEnd)+1+' days · '+fmtD(p.cycleStart)+' to '+fmtD(p.cycleEnd) : 'Set dates above'}

      <div class="ff" style="margin:0"><label>Pay cycle type</label>
        <select onchange="S.settings.incomes[${i}].cycleType=this.value;autoSave()">
          ${['WEEKLY','FORTNIGHTLY','MONTHLY'].map(c=>`<option value="${c}"${(p.cycleType||'FORTNIGHTLY')===c?' selected':''}>${c}</option>`).join('')}

  <div class="sec-lbl">Shared allocations</div>

    ${S.settings.sharedAllocs.map((a,i)=>`<div class="f2" style="margin-bottom:8px;align-items:end">
      <div class="ff" style="margin:0"><label>Name</label><input type="text" value="${a.name}" onchange="S.settings.sharedAllocs[${i}].name=this.value;autoSave()"></div>
      <div style="display:flex;gap:6px">
        <div class="ff" style="margin:0;flex:1"><label>Amount ($)</label><input type="number" value="${a.amount}" onchange="S.settings.sharedAllocs[${i}].amount=+this.value;autoSave();renderKeepScroll()"></div>

}

// ══════════════════════════════════════════════════════════════════════════════
// MODALS
// ══════════════════════════════════════════════════════════════════════════════
function billModal(id) {
  const b=id?S.bills.find(x=>x.id===id):{name:'',freq:'MONTHLY',amount:0,lastDue:today(),paidHistory:[],include:true,missed:false,pinned:false,linkedLoanId:null};
  if(!b)return;
  const loanOpts=S.loans.map(l=>`<option value="${l.id}"${b.linkedLoanId===l.id?' selected':''}>${l.name}</option>`).join('');
  modal(id?'Edit bill':'Add bill',`
    <div class="ff"><label>Bill name</label><input id="m-n" value="${b.name}"></div>
    <div class="f2">
      <div class="ff"><label>Frequency</label><select id="m-f">${FREQS.map(f=>`<option${b.freq===f?' selected':''}>${f}</option>`).join('')}</select></div>
      <div class="ff"><label>Amount ($)</label><input id="m-a" type="number" value="${b.amount}"></div>
    </div>
    <div class="f2">
      <div class="ff"><label>Last due date</label><input id="m-d" type="date" value="${b.lastDue||today()}"></div>
      <div class="ff"><label>Include in totals</label><select id="m-i"><option value="true"${b.include?' selected':''}>Yes</option><option value="false"${!b.include?' selected':''}>No</option></select></div>
    </div>
    ${S.loans.length?`<div class="ff" style="margin-bottom:0">
      <label style="display:flex;align-items:center;gap:8px;cursor:pointer">
        <input type="checkbox" id="m-isl" ${b.linkedLoanId?'checked':''} onchange="document.getElementById('m-ll-wrap').style.display=this.checked?'block':'none'">
        <span>This is a loan repayment</span>
        ${b.linkedLoanId?'<span class="pill p-b" style="font-size:9px">LOAN</span>':''}
      </label>
      <div id="m-ll-wrap" style="margin-top:8px;display:${b.linkedLoanId?'block':'none'}">
        <label>Linked loan</label>
        <select id="m-ll"><option value="">— select loan —</option>${loanOpts}</select>
      </div>
    </div>`:''}`,
  ()=>{
    const name=$('m-n').value.trim();if(!name)return;
    const isLoan=$('m-isl')&&$('m-isl').checked;
    const linkedLoanId=isLoan&&$('m-ll')?+$('m-ll').value||null:null;
    if(id){const bx=S.bills.find(x=>x.id===id);bx.name=name;bx.freq=$('m-f').value;bx.amount=+$('m-a').value;if($('m-d').value)bx.lastDue=$('m-d').value;bx.include=$('m-i').value==='true';bx.linkedLoanId=linkedLoanId;}
    else S.bills.push({id:nid(),name,freq:$('m-f').value,amount:+$('m-a').value,lastDue:$('m-d').value||today(),paidHistory:[],include:$('m-i').value==='true',missed:false,pinned:false,linkedLoanId});
    autoSave();renderKeepScroll();
  });
}

function markPaid(id) {
  const b=S.bills.find(x=>x.id===id);if(!b)return;
  const nd=nextDue(b)||today();
  const linkedLoan=b.linkedLoanId?S.loans.find(l=>l.id===b.linkedLoanId):null;
  modal('Mark as paid',`
    <div style="margin-bottom:12px;font-size:13px;color:var(--text2)">Scheduled: <strong style="color:var(--text)">${fmtD(nd)} · ${fmt(b.amount)}</strong></div>
    <div class="ff"><label>Actual amount charged ($)</label>
      <input id="m-aa" type="number" value="${b.amount}" placeholder="${b.amount}">
      <div style="font-size:11px;color:var(--text3);margin-top:3px">Change if the amount differed from budgeted</div>
    </div>
    <div class="ff" style="margin-bottom:0"><label>Date paid</label><input id="m-ap" type="date" value="${today()}"></div>
    ${linkedLoan?`<div style="margin-top:10px;padding:8px 12px;background:var(--bg3);border-radius:8px;font-size:12px;color:var(--text2)">Linked to <strong style="color:var(--text)">${linkedLoan.name}</strong> — balance will update automatically</div>`:''}`,
  ()=>{
    const actualAmt=+$('m-aa').value||b.amount;
    const actualDate=$('m-ap').value||today();
    const diff=actualAmt-b.amount;
    // Snapshot before change
    saveAction(`${b.name} — marked paid ${fmt(actualAmt)}`, {
      bills: JSON.parse(JSON.stringify(S.bills)),
      loans: JSON.parse(JSON.stringify(S.loans)),
      leaks: JSON.parse(JSON.stringify(S.leaks))
    });
    if(!b.paidHistory)b.paidHistory=[];
    b.paidHistory.push({due:nd,actual:actualDate,actualAmt,budgeted:b.amount,diff,retry:false});
    b.lastDue=nd;
    // Payment plan: deduct any overpay from arrears first
    if(b.paymentPlan && diff > 0) {
      b.paymentPlan.paid = (b.paymentPlan.paid||0) + diff;
      b.paymentPlan.payments.push({date:actualDate,amount:diff,note:`Extra toward arrears`});
      if(b.paymentPlan.paid >= b.paymentPlan.debt) {
        b.paymentPlan = null; // Arrears fully cleared
      }
    } else if(!b.paymentPlan && diff>0&&!b.linkedLoanId){
      S.leaks.push({id:nid(),date:actualDate,category:`Bill overpay — ${b.name}`,amount:diff,note:`Budgeted ${fmt(b.amount)}, charged ${fmt(actualAmt)}`});
    }
    // Auto-update linked loan balance
    if(b.linkedLoanId){
      const loan=S.loans.find(l=>l.id===b.linkedLoanId);
      if(loan){
        const rpp={WEEKLY:(+loan.rate)/100/52,FORTNIGHTLY:(+loan.rate)/100/26,MONTHLY:(+loan.rate)/100/12}[loan.freq]||0;
        const interest=Math.max(0,rpp*(+loan.current));
        const principal=Math.max(0,actualAmt-interest);
        const newBalance=Math.max(0,(+loan.current)-principal);
        if(!loan.paymentHistory)loan.paymentHistory=[];
        loan.paymentHistory.push({date:actualDate,payment:actualAmt,interest:+interest.toFixed(2),principal:+principal.toFixed(2),balance:+newBalance.toFixed(2)});
        loan.current=+newBalance.toFixed(2);
        // Extra principal if overpaid vs scheduled
        if(diff>0){
          const extraNote=`Extra principal payment ${fmt(diff)} — payoff date moved forward`;
          loan.paymentHistory[loan.paymentHistory.length-1].note=extraNote;
        }
      }
    }
    autoSave();renderKeepScroll();
    if(diff!==0&&!b.linkedLoanId){
      const msg=diff>0?`Paid ${fmt(actualAmt)} — ${fmt(diff)} over budget, logged as a leak.`:`Paid ${fmt(actualAmt)} — ${fmt(Math.abs(diff))} under budget.`;
      alert(msg);
    } else if(diff!==0&&b.linkedLoanId){
      const msg=diff>0?`Paid ${fmt(actualAmt)} — extra ${fmt(diff)} applied to principal. Loan balance updated.`:`Paid ${fmt(actualAmt)} — noted.`;
      alert(msg);
    }
  });
}

function retryModal(id) {
  const b=S.bills.find(x=>x.id===id);if(!b)return;
  const cycles=missedCycles(b);
  modal('Retry payment',`
    <div style="background:var(--red-d);border-radius:8px;padding:10px 12px;margin-bottom:14px;font-size:12px;color:var(--red-t)">
      <strong>${b.name}</strong> — ${cycles} cycle${cycles!==1?'s':''} missed · Original: ${fmt(b.amount)}
    </div>
    <div class="ff"><label>Total amount actually charged ($)</label>
      <input id="m-rc" type="number" placeholder="${b.amount}" value="${b.amount}">
      <div style="font-size:11px;color:var(--text3);margin-top:4px">Enter whatever they actually took out. Any amount above the original becomes a penalty leak.</div>
    </div>
    <div class="ff" style="margin-bottom:0"><label>Date payment came out</label>
      <input id="m-rd" type="date" value="${today()}">
    </div>`,
  ()=>{
    const charged=+$('m-rc').value||b.amount;
    const date=$('m-rd').value||today();
    const penalty=Math.max(0,charged-b.amount);
    const nd=nextDue(b)||today();
    // Snapshot before change
    saveAction(`${b.name} — retry payment ${fmt(charged)}${penalty>0?' (+'+fmt(penalty)+' penalty)':''}`, {
      bills: JSON.parse(JSON.stringify(S.bills)),
      loans: JSON.parse(JSON.stringify(S.loans)),
      leaks: JSON.parse(JSON.stringify(S.leaks))
    });
    // Log in history
    if(!b.paidHistory)b.paidHistory=[];
    b.paidHistory.push({
      due:nd, actual:date, retry:true,
      charged, original:b.amount, penalty
    });

    // Auto-create leak for penalty
    if(penalty>0){
      S.leaks.push({id:nid(),date,category:`Missed payment penalty — ${b.name}`,amount:penalty,note:`Retry: charged ${fmt(charged)}, original ${fmt(b.amount)}`});
    }

    // Advance lastDue by correct number of periods to get back on cycle
    let advancedDate = b.lastDue||date;
    for(let i=0;i<=cycles;i++) advancedDate=advanceOne(b.freq,advancedDate);
    b.lastDue=advanceOne(b.freq,advancedDate); // one more to set next due correctly
    // Actually: set lastDue to the most recent missed due date so nextDue points to next upcoming
    let d=b.lastDue||date;
    for(let i=0;i<cycles+1&&i<200;i++) d=advanceOne(b.freq,b.lastDue||date);
    // Simple: advance from original lastDue by (cycles+1) periods
    let ld=b.lastDue||today();
    for(let i=0;i<cycles+1;i++) ld=advanceOne(b.freq,ld);
    b.lastDue=ld;
    b.missed=false;

    autoSave();renderKeepScroll();
    alert(`Done! ${penalty>0?`Penalty of ${fmt(penalty)} logged as a leak. `:''}Bill is back on cycle — next due ${fmtD(nextDue(b))}.`);
  });
}
